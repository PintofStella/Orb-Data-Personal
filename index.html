<!DOCTYPE html>
<html lang="en">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ORB5">

<title>ORB5 Trading Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#070710;color:#c8d6e5;font-family:Georgia,serif;font-size:14px;}
button{font-family:monospace;cursor:pointer;transition:all .15s;}
input,textarea{font-family:monospace;background:#0d0d1a;border:1px solid #1a1a35;border-radius:6px;color:#e2e8f0;padding:10px 12px;font-size:13px;width:100%;outline:none;}
textarea{resize:vertical;min-height:55px;}
.hdr{background:#0d0d14;border-bottom:1px solid #1a1a35;padding:14px 18px 0;position:sticky;top:0;z-index:100;}
.row{display:flex;justify-content:space-between;align-items:center;}
.mono{font-family:monospace;}
.muted{color:#4a5568;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.card{background:#0d0d1a;border:1px solid #1a1a35;border-radius:8px;padding:14px;}
.tag{display:inline-flex;gap:3px;align-items:center;background:#1a1a35;border-radius:3px;padding:2px 7px;margin:2px;}
.chip{border-radius:4px;padding:5px 10px;font-size:10px;font-family:monospace;border:1px solid #1a1a35;background:transparent;color:#4a5568;}
.chip.on{border-color:rgba(255,255,255,.4);}
.nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;padding:8px 10px;font-size:10px;font-family:monospace;letter-spacing:1px;white-space:nowrap;color:#4a5568;}
.nav-btn.on{background:#1a1a35;color:#e8edf5;}
.view{padding:16px;}
.stat-card{background:#0d0d1a;border-radius:6px;padding:9px 11px;}
.jrow{display:grid;grid-template-columns:72px 40px 44px 58px 58px 60px;gap:4px;padding:9px 8px;cursor:pointer;}
.btn-primary{border:none;border-radius:6px;padding:14px;font-size:12px;font-family:monospace;font-weight:700;letter-spacing:1px;width:100%;}
.btn-sm{border-radius:6px;padding:6px 12px;font-size:10px;font-family:monospace;border:1px solid;}
.progress-bar{height:2px;background:#1a1a35;border-radius:2px;}
.detail-box{background:#111128;border:1px solid #1a1a35;border-top:none;border-radius:0 0 6px 6px;padding:12px 14px;}
.check-item{background:#0d0d1a;border:1px solid #1a1a35;border-radius:7px;overflow:hidden;margin-bottom:5px;}

.pw-wrap{position:fixed;inset:0;background:#070710;display:flex;align-items:center;justify-content:center;padding:20px;z-index:9999;}
.pw-card{width:min(420px,100%);background:#0d0d1a;border:1px solid #1a1a35;border-radius:12px;padding:22px;}
.pw-title{font-family:monospace;letter-spacing:2px;color:#00ff9d;font-size:11px;margin-bottom:8px;}
.pw-err{font-size:12px;color:#f43f5e;margin-top:10px;font-family:monospace;}

</style>
</head>

  {id:1,date:"19-02-26",imported:true,wins:2,losses:0,green:191.22,red:0,dayNotes:""},
  {id:2,date:"23-02-26",imported:true,wins:1,losses:1,green:25.52,red:0.10,dayNotes:""},

];


const AUTH_KEY="orb5_auth_v1";
const APP_PASSWORD="Orb5trategy";
function isAuthed(){try{return sessionStorage.getItem(AUTH_KEY)==="1";}catch{return false;}}
function showPasswordGate(err=""){
  document.getElementById("app").innerHTML=`<div class="pw-wrap"><div class="pw-card"><div class="pw-title">ORB5 PRIVATE ACCESS</div><div style="font-size:22px;color:#e8edf5;margin-bottom:8px">Enter password</div><div style="font-size:12px;color:#8892a4;line-height:1.6;margin-bottom:14px">This journal runs locally in your browser. Enter your password to continue.</div><input id="pwInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')submitPassword()" /><button class="btn-primary" onclick="submitPassword()" style="margin-top:12px;background:linear-gradient(135deg,#00ff9d20,#4ecdc420);border:1px solid #00ff9d50;color:#00ff9d">UNLOCK</button>${err?`<div class="pw-err">${err}</div>`:""}</div></div>`;
  setTimeout(()=>{const el=document.getElementById('pwInput'); if(el) el.focus();},30);
}
window.submitPassword=function(){
  const v=(document.getElementById('pwInput')||{}).value||"";
  if(v===APP_PASSWORD){try{sessionStorage.setItem(AUTH_KEY,"1");}catch{} renderApp();}
  else showPasswordGate("Incorrect password");
};

// ── State ──────────────────────────────────────────────────────────────────
const lsG=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const S={
  paper:lsG(KEYS.p)||INIT,
  live:lsG(KEYS.l)||[],
  mode:"paper",view:"dashboard",checkId:"readiness",
  cp:lsG(KEYS.cp)||{},
  cd:(()=>{const s=lsG(KEYS.cd);return(s&&s.date===TODAY)?s.checks||{}:{}; })(),
  expDay:null,expCk:{},
  addDate:"",pending:[],dayNotes:"",err:"",showTF:true,
  tf:{...E0}
};

function setState(u){Object.assign(S,u);if(isAuthed()) renderApp();}
function setTf(u){Object.assign(S.tf,u);if(isAuthed()) renderApp();}
function savePaper(){lsS(KEYS.p,S.paper);}
function saveLive(){lsS(KEYS.l,S.live);}
function saveCd(){lsS(KEYS.cd,{date:TODAY,checks:S.cd});}

// ── Helpers ────────────────────────────────────────────────────────────────
function ds(day){
  if(day.imported)return{count:day.wins+day.losses,wins:day.wins,losses:day.losses,green:day.green,red:day.red};
  const ts=day.trades||[],w=ts.filter(t=>t.result==="win"),l=ts.filter(t=>t.result==="loss");
  return{count:ts.length,wins:w.length,losses:l.length,green:w.reduce((a,t)=>a+t.amount,0),red:l.reduce((a,t)=>a+t.amount,0)};
}
function calcSt(days){
  const a=days.map(ds),tc=a.reduce((s,d)=>s+d.count,0),tw=a.reduce((s,d)=>s+d.wins,0),tl=a.reduce((s,d)=>s+d.losses,0);
  const tg=a.reduce((s,d)=>s+d.green,0),tr=a.reduce((s,d)=>s+d.red,0),net=tg-tr;
  const wr=tc>0?tw/tc:0,aw=tw>0?tg/tw:0,al=tl>0?tr/tl:0,rr=al>0?aw/al:0;
  return{tc,tw,tl,tg,tr,net,wr,aw,al,rr,exp:(wr*aw)-((1-wr)*al),apd:days.length>0?net/days.length:0,bal:1000+net,ret:(net/1000)*100};
}
const f2=n=>`£${Math.abs(n).toFixed(2)}`;
const fS=n=>`${n>=0?"+":"-"}£${Math.abs(n).toFixed(2)}`;
function exitSum(t){return[t.tpPct&&t.tpPct!=="0%"&&`TP:${t.tpPct}`,t.slPct&&t.slPct!=="0%"&&`SL:${t.slPct}`,t.bePct&&t.bePct!=="0%"&&`BE:${t.bePct}`,t.earlyPct&&t.earlyPct!=="0%"&&`Early:${t.earlyPct}`].filter(Boolean).join(" · ");}
function sortDays(arr){return arr.sort((a,b)=>{const p=s=>{const[d,m,y]=s.split("-");return new Date(`20${y}-${m}-${d}`);};return p(a.date)-p(b.date);});}
function buildEq(days){let b=1000;const pts=[{label:"Start",bal:b}];days.forEach(d=>{const s=ds(d);b=parseFloat((b+s.green-s.red).toFixed(2));pts.push({label:d.date.slice(0,5),bal:b});});return pts;}

// ── SVG Chart ─────────────────────────────────────────────────────────────
function svgChart(pts,acc){
  if(pts.length<2)return`<div style="height:155px;display:flex;align-items:center;justify-content:center;color:#4a5568;font-family:monospace;font-size:12px">Add more days to see chart</div>`;
  const W=320,H=130,PAD=8;
  const vals=pts.map(p=>p.bal),mn=Math.min(...vals)*0.995,mx=Math.max(...vals)*1.005;
  const px=(i)=>PAD+(i/(pts.length-1))*(W-PAD*2);
  const py=(v)=>H-PAD-((v-mn)/(mx-mn))*(H-PAD*2);
  const points=pts.map((p,i)=>`${px(i)},${py(p.bal)}`).join(" ");
  const refY=py(1000);
  const areaPoints=`${px(0)},${H-PAD} ${points} ${px(pts.length-1)},${H-PAD}`;
  const labels=[];
  const step=Math.max(1,Math.floor(pts.length/5));
  pts.forEach((p,i)=>{if(i===0||i===pts.length-1||(i%step===0))labels.push(`<text x="${px(i)}" y="${H+2}" text-anchor="middle" font-size="7" fill="#4a5568" font-family="monospace">${p.label}</text>`);});
  const yVals=[mn,1000,mx].filter((v,i,a)=>a.indexOf(v)===i);
  const yLabels=yVals.map(v=>`<text x="0" y="${py(v)+4}" font-size="7" fill="#4a5568" font-family="monospace">£${Math.round(v)}</text>`);
  return`<svg viewBox="0 0 ${W} ${H+12}" style="width:100%;height:160px;overflow:visible">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${acc}" stop-opacity=".15"/><stop offset="100%" stop-color="${acc}" stop-opacity="0"/></linearGradient></defs>
    <line x1="${PAD}" y1="${refY}" x2="${W-PAD}" y2="${refY}" stroke="#1a1a35" stroke-dasharray="4,3" stroke-width="1"/>
    <polygon points="${areaPoints}" fill="url(#ag)"/>
    <polyline points="${points}" fill="none" stroke="${acc}" stroke-width="2" stroke-linejoin="round"/>
    ${labels.join("")}
    ${yLabels.join("")}
  </svg>`;
}

// ── Chip HTML ──────────────────────────────────────────────────────────────
function chips(label,opts,field,color,labelColor){
  const val=S.tf[field]||"";
  const btns=opts.map(o=>{
    const on=val===o;
    return`<button class="chip${on?" on":""}" onclick="setTf({'${field}':'${val===o?'':o}'})" style="${on?`background:${color}18;color:${color};border-color:${color}60`:""}">${o}</button>`;
  }).join("");
  return`<div style="margin-bottom:10px"><div style="font-size:9px;color:${labelColor||"#4a5568"};font-family:monospace;letter-spacing:1px;margin-bottom:5px">${label}</div><div style="display:flex;gap:5px;flex-wrap:wrap">${btns}</div></div>`;
}

// ── Views ──────────────────────────────────────────────────────────────────
function viewDashboard(days,st,acc){
  const eq=buildEq(days);
  const statCards=[
    {l:"Win Rate",v:`${(st.wr*100).toFixed(1)}%`,s:"Target 55%+",c:st.wr>=0.55?acc:"#f43f5e"},
    {l:"R:R",v:`${st.rr.toFixed(2)}:1`,s:"Target 2:1",c:st.rr>=1.9?acc:"#ffd700"},
    {l:"Expectancy",v:f2(st.exp),s:"Per trade",c:"#4ecdc4"},
    {l:"Avg Win",v:f2(st.aw),s:"Per winner",c:"#a78bfa"},
    {l:"Avg Loss",v:f2(st.al),s:"Per loser",c:"#f97316"},
    {l:"Avg/Day",v:f2(st.apd),s:"Trading days",c:"#ffd700"},
  ].map(s=>`<div class="stat-card" style="border:1px solid ${s.c}20;border-top:2px solid ${s.c}60"><div style="font-size:15px;font-weight:700;color:${s.c};font-family:monospace;line-height:1">${s.v}</div><div style="font-size:10px;color:#e8edf5;margin:3px 0 1px;font-family:monospace">${s.l}</div><div style="font-size:9px;color:#4a5568">${s.s}</div></div>`).join("");
  const countCards=[["Trades",st.tc,"#e8edf5"],["Wins",st.tw,acc],["Losses",st.tl,"#f43f5e"]].map(([l,v,c])=>`<div class="card" style="text-align:center"><div style="font-size:22px;font-weight:700;color:${c};font-family:monospace">${v}</div><div style="font-size:10px;color:#4a5568;font-family:monospace">${l}</div></div>`).join("");
  const last5=days.length===0?`<div style="font-size:12px;color:#4a5568;text-align:center;padding:16px 0">No days recorded yet.</div>`:[...days].slice(-5).reverse().map((d,i,arr)=>{const s=ds(d),pl=s.green-s.red;return`<div class="row" style="padding:7px 0;border-bottom:${i<arr.length-1?"1px solid #1a1a35":"none"}"><div style="display:flex;gap:10px;align-items:center"><span style="font-size:11px;color:#8892a4;font-family:monospace;min-width:68px">${d.date}</span><span style="font-size:10px;color:#4a5568">${s.count}T · ${s.wins}W/${s.losses}L</span></div><span style="font-size:13px;font-weight:700;color:${pl>=0?acc:"#f43f5e"};font-family:monospace">${fS(pl)}</span></div>`;}).join("");
  return`<div class="grid3" style="margin-bottom:9px">${statCards}</div><div class="grid3" style="margin-bottom:12px">${countCards}</div><div class="card" style="margin-bottom:12px"><div style="font-size:9px;letter-spacing:3px;color:#4a5568;margin-bottom:10px;font-family:monospace">EQUITY CURVE</div>${svgChart(eq,acc)}</div><div class="card"><div style="font-size:9px;letter-spacing:3px;color:#4a5568;margin-bottom:10px;font-family:monospace">LAST 5 DAYS</div>${last5}</div>`;
}

function viewJournal(days,st,acc){
  const hdr=`<div style="display:grid;grid-template-columns:72px 40px 44px 58px 58px 60px;gap:4px;padding:4px 8px;margin-bottom:2px">${["DATE","T","W/L","GREEN","RED","P/L"].map(h=>`<div style="font-size:8px;color:#4a5568;font-family:monospace;letter-spacing:1px">${h}</div>`).join("")}</div>`;
  const rows=[...days].reverse().map((d,i)=>{
    const s=ds(d),pl=s.green-s.red,isE=S.expDay===d.id;
    const trades=(!d.imported&&d.trades)?d.trades.map(t=>{
      const ex=exitSum(t);
      const tags=[t.catalyst&&`<span class="tag"><span style="font-size:8px;color:#4a5568">Cat:</span><span style="font-size:9px;color:#a78bfa">${t.catalyst}</span></span>`,t.rvol&&`<span class="tag"><span style="font-size:8px;color:#4a5568">RVOL:</span><span style="font-size:9px;color:#4ecdc4">${t.rvol}</span></span>`,t.gap&&`<span class="tag"><span style="font-size:8px;color:#4a5568">Gap:</span><span style="font-size:9px;color:#4ecdc4">${t.gap}%</span></span>`,t.spx&&`<span class="tag"><span style="font-size:8px;color:#4a5568">S&P:</span><span style="font-size:9px;color:${t.spx==="Green"?"#00ff9d":t.spx==="Red"?"#f43f5e":"#8892a4"}">${t.spx}</span></span>`,t.retest&&`<span class="tag"><span style="font-size:8px;color:#4a5568">Retest:</span><span style="font-size:9px;color:#ffd700">${t.retest}</span></span>`,ex&&`<span class="tag"><span style="font-size:8px;color:#4a5568">Exit:</span><span style="font-size:9px;color:${t.result==="win"?acc:"#f97316"}">${ex}</span></span>`,t.lossReason&&`<span class="tag"><span style="font-size:8px;color:#4a5568">Why:</span><span style="font-size:9px;color:#f43f5e">${t.lossReason}</span></span>`].filter(Boolean).join("");
      return`<div style="padding:10px 0;border-bottom:1px solid #1a1a3530"><div class="row" style="margin-bottom:6px"><div style="display:flex;gap:7px;align-items:center"><span style="font-size:11px;color:${t.result==="win"?acc:"#f43f5e"};font-family:monospace;font-weight:700;background:${t.result==="win"?acc+"15":"#f43f5e15"};padding:2px 8px;border-radius:3px">${t.result==="win"?"WIN":"LOSS"}</span>${t.ticker?`<span style="font-size:12px;color:#e8edf5;font-family:monospace;font-weight:700">${t.ticker}</span>`:""}<span style="font-size:9px;color:#4a5568;background:#1a1a35;padding:2px 6px;border-radius:3px;font-family:monospace">Gr.${t.grade}</span></div><span style="font-size:13px;color:${t.result==="win"?acc:"#f43f5e"};font-family:monospace;font-weight:700">${t.result==="win"?"+":"-"}£${t.amount.toFixed(2)}</span></div>${tags?`<div style="display:flex;flex-wrap:wrap;margin-bottom:4px">${tags}</div>`:""} ${t.notes?`<div style="font-size:11px;color:#8892a4;font-style:italic">"${t.notes}"</div>`:""}</div>`;
    }).join(""):"";
    const detail=isE?`<div class="detail-box">${d.imported?`<div style="font-size:11px;color:#4a5568;font-family:monospace;margin-bottom:8px">Imported day — totals only.</div>`:`${trades}`}${d.dayNotes?`<p style="margin:8px 0 10px;font-size:12px;color:#8892a4">📝 ${d.dayNotes}</p>`:""}<button class="btn-sm" onclick="delDay(${d.id})" style="color:#f43f5e;border-color:#f43f5e30;background:#f43f5e12">Delete Day</button></div>`:"";
    return`<div style="margin-bottom:2px"><div class="jrow" onclick="toggleDay(${d.id})" style="background:${i%2===0?"#0d0d1a":"#0a0a12"};border-radius:${isE?"6px 6px 0 0":"4px"};border-left:3px solid ${pl>=0?acc+"40":"#f43f5e40"}"><span style="font-size:11px;color:#8892a4;font-family:monospace">${d.date}</span><span style="font-size:11px;color:#e8edf5;font-family:monospace">${s.count}</span><span style="font-size:11px;color:#e8edf5;font-family:monospace">${s.wins}/${s.losses}</span><span style="font-size:11px;color:${acc};font-family:monospace">${f2(s.green)}</span><span style="font-size:11px;color:${s.red>0?"#f43f5e":"#4a5568"};font-family:monospace">${f2(s.red)}</span><span style="font-size:12px;font-weight:700;color:${pl>=0?acc:"#f43f5e"};font-family:monospace">${fS(pl)}</span></div>${detail}</div>`;
  }).join("");
  const totals=days.length>0?`<div class="jrow" style="padding:10px 8px;margin-top:6px;border-top:2px solid #1a1a35"><span style="font-size:10px;color:#e8edf5;font-family:monospace;font-weight:700">TOTALS</span><span style="font-size:10px;color:#e8edf5;font-family:monospace;font-weight:700">${st.tc}</span><span style="font-size:10px;color:#e8edf5;font-family:monospace;font-weight:700">${st.tw}/${st.tl}</span><span style="font-size:10px;color:${acc};font-family:monospace;font-weight:700">${f2(st.tg)}</span><span style="font-size:10px;color:#f43f5e;font-family:monospace;font-weight:700">${f2(st.tr)}</span><span style="font-size:11px;font-weight:700;color:${st.net>=0?acc:"#f43f5e"};font-family:monospace">${fS(st.net)}</span></div>`:"";
  return`<div class="row" style="margin-bottom:12px"><div style="font-size:9px;letter-spacing:3px;color:#4a5568;font-family:monospace">${days.length} DAYS LOGGED</div><button class="btn-sm" onclick="setState({view:'add'})" style="color:${acc};border-color:${acc}40;background:${acc}18">+ ADD DAY</button></div>${days.length>0?hdr:""}${days.length===0?`<div style="font-size:13px;color:#4a5568;text-align:center;padding:40px 0">No days recorded.</div>`:""}${rows}${totals}`;
}

function viewAdd(acc){
  const tf=S.tf;
  const pending=S.pending;
  const pG=pending.filter(t=>t.result==="win").reduce((a,t)=>a+t.amount,0);
  const pR=pending.filter(t=>t.result==="loss").reduce((a,t)=>a+t.amount,0);
  const pList=pending.length>0?`<div class="card" style="border:1px solid ${acc}20;margin-bottom:12px"><div style="font-size:9px;letter-spacing:3px;color:#4a5568;margin-bottom:8px;font-family:monospace">TRADES ADDED (${pending.length})</div>${pending.map((t,i)=>`<div class="row" style="padding:6px 0;border-bottom:${i<pending.length-1?"1px solid #1a1a3530":"none"}"><div style="display:flex;gap:7px;align-items:center"><span style="font-size:10px;color:${t.result==="win"?acc:"#f43f5e"};font-family:monospace;font-weight:700">${t.result==="win"?"W":"L"}</span>${t.ticker?`<span style="font-size:11px;color:#e8edf5;font-family:monospace">${t.ticker}</span>`:""}<span style="font-size:9px;color:#4a5568;background:#1a1a35;padding:2px 5px;border-radius:3px;font-family:monospace">Gr.${t.grade}</span>${exitSum(t)?`<span style="font-size:9px;color:#8892a4;font-family:monospace">${exitSum(t)}</span>`:""}</div><div style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;color:${t.result==="win"?acc:"#f43f5e"};font-family:monospace;font-weight:700">${t.result==="win"?"+":"-"}£${t.amount.toFixed(2)}</span><button onclick="removePending(${i})" style="border:1px solid #f43f5e30;background:transparent;color:#f43f5e;border-radius:4px;padding:2px 7px;font-size:9px">✕</button></div></div>`).join("")}<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid #1a1a35;text-align:center"><div><div style="font-size:13px;color:#00ff9d;font-family:monospace;font-weight:700">${f2(pG)}</div><div style="font-size:9px;color:#4a5568">Green</div></div><div><div style="font-size:13px;color:#f43f5e;font-family:monospace;font-weight:700">${f2(pR)}</div><div style="font-size:9px;color:#4a5568">Red</div></div><div><div style="font-size:13px;font-weight:700;font-family:monospace;color:${(pG-pR)>=0?"#00ff9d":"#f43f5e"}">${fS(pG-pR)}</div><div style="font-size:9px;color:#4a5568">Net</div></div></div></div>`:"";
  const addMoreBtn=!S.showTF&&pending.length>0?`<button onclick="setState({showTF:true})" style="width:100%;background:${acc}12;border:1px solid ${acc}30;color:${acc};padding:10px;font-size:10px;font-family:monospace;border-radius:6px;margin-bottom:12px">+ ADD ANOTHER TRADE</button>`:"";
  const exitBd=`<div style="background:#070710;border:1px solid #1a1a35;border-radius:6px;padding:10px 12px;margin-bottom:10px"><div style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;margin-bottom:8px">EXIT BREAKDOWN — should total 100%</div>${chips("% AT FULL TP",PCT,"tpPct","#00ff9d")}${chips("% STOPPED OUT",PCT,"slPct","#f43f5e")}${chips("% AT BREAKEVEN",PCT,"bePct","#ffd700")}${chips("% EARLY EXIT",PCT,"earlyPct","#f97316")}${exitSum(tf)?`<div style="font-size:11px;color:#4ecdc4;font-family:monospace;margin-top:4px">Summary: ${exitSum(tf)}</div>`:""}</div>`;
  const tfHtml=S.showTF?`<div class="card" style="border:1px solid ${acc}25;margin-bottom:12px"><div style="font-size:9px;letter-spacing:3px;color:${acc};margin-bottom:12px;font-family:monospace">TRADE DETAILS</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><div><label style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">TICKER</label><input id="t_ticker" placeholder="NVDA" oninput="S.tf.ticker=this.value.toUpperCase()" value="${tf.ticker}" style="text-transform:uppercase"/></div><div><label style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">RESULT</label><div style="display:flex;gap:5px">${["win","loss"].map(r=>`<button onclick="setTf({result:'${r}'})" style="flex:1;padding:9px 4px;font-size:11px;background:${tf.result===r?(r==="win"?"#00ff9d18":"#f43f5e18"):"transparent"};color:${tf.result===r?(r==="win"?"#00ff9d":"#f43f5e"):"#4a5568"};border:1px solid ${tf.result===r?(r==="win"?"#00ff9d40":"#f43f5e40"):"#1a1a35"};border-radius:6px;font-weight:${tf.result===r?700:400}">${r==="win"?"WIN":"LOSS"}</button>`).join("")}</div></div></div><div style="margin-bottom:10px"><label style="font-size:9px;color:${tf.result==="win"?"#00ff9d":"#f43f5e"};font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">£ ${tf.result==="win"?"PROFIT":"LOSS"}</label><input id="t_amt" type="number" step="0.01" min="0" placeholder="0.00" oninput="S.tf.amount=this.value" value="${tf.amount}" style="border-color:${tf.result==="win"?"#00ff9d20":"#f43f5e20"}"/></div>${chips("GRADE",["A","B","C"],"grade",acc)}${chips("CATALYST",CATALYSTS,"catalyst","#a78bfa")}<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px"><div><label style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">RVOL AT ENTRY</label><input id="t_rvol" type="number" step="0.1" min="0" placeholder="e.g. 1.8" oninput="S.tf.rvol=this.value" value="${tf.rvol}"/></div><div><label style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">GAP % AT OPEN</label><input id="t_gap" type="number" step="0.1" placeholder="e.g. 2.1" oninput="S.tf.gap=this.value" value="${tf.gap}"/></div></div>${chips("S&P AT ENTRY",["Green","Flat","Red"],"spx","#4ecdc4")}${chips("RETEST QUALITY",["Clean","Multiple","Weak"],"retest","#ffd700")}${exitBd}${tf.result==="loss"?chips("LOSS REASON",LOSS_R,"lossReason","#f43f5e","#f43f5e"):""}<div style="margin-bottom:12px"><label style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">NOTES</label><input id="t_notes" placeholder="Setup notes, what happened..." oninput="S.tf.notes=this.value" value="${tf.notes||""}"/></div>${S.err?`<div style="font-size:11px;color:#f43f5e;font-family:monospace;background:#f43f5e12;padding:7px 10px;border-radius:5px;margin-bottom:10px">${S.err}</div>`:""}<div style="display:flex;gap:8px"><button onclick="addTrade()" style="flex:1;background:${acc}18;border:1px solid ${acc}40;color:${acc};font-weight:700;padding:11px;font-size:11px;border-radius:6px;font-family:monospace">+ ADD TRADE</button>${pending.length>0?`<button onclick="setState({showTF:false})" style="padding:11px 14px;background:transparent;border:1px solid #1a1a35;color:#4a5568;font-size:10px;border-radius:6px;font-family:monospace">Done</button>`:""}</div></div>`:"";
  const canSave=S.addDate&&pending.length>0;
  return`<div style="font-size:9px;letter-spacing:3px;color:${acc};margin-bottom:14px;font-family:monospace">ADD TRADING DAY · ${S.mode==="paper"?"PAPER":"LIVE"}</div><div style="margin-bottom:12px"><label style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">DATE (DD-MM-YY)</label><input id="addDate" placeholder="e.g. 02-04-26" oninput="S.addDate=this.value" value="${S.addDate}"/></div>${pList}${addMoreBtn}${tfHtml}<div style="margin-bottom:12px"><label style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:1px;display:block;margin-bottom:4px">DAY NOTES</label><textarea id="dayNotes" placeholder="Market conditions, overall observations..." oninput="S.dayNotes=this.value">${S.dayNotes}</textarea></div><button onclick="saveDay()" class="btn-primary" style="background:${canSave?`linear-gradient(135deg,${acc}20,#4ecdc420)`:"#1a1a35"};border:1px solid ${canSave?acc+"50":"#1a1a35"};color:${canSave?acc:"#4a5568"};opacity:${canSave?1:0.5}">SAVE DAY (${pending.length} trade${pending.length!==1?"s":""})</button>`;
}

function viewChecklist(){
  const sec=CHECKS.find(s=>s.id===S.checkId)||CHECKS[0];
  const pills=CHECKS.map(s=>{
    const done=s.items.filter((_,i)=>(s.perm?S.cp:S.cd)[`${s.id}-${i}`]).length;
    const on=S.checkId===s.id;
    return`<button onclick="setState({checkId:'${s.id}'})" style="white-space:nowrap;padding:6px 12px;font-size:10px;font-family:monospace;border-radius:6px;border:1px solid ${on?sec.color+"50":"#1a1a35"};background:${on?sec.color+"18":"#0d0d1a"};color:${on?sec.color:"#4a5568"};cursor:pointer">${s.icon} ${s.title.split(" ")[0]}${s.perm?" 🔒":""} ${done}/${s.items.length}</button>`;
  }).join("");
  const done=sec.items.filter((_,i)=>(sec.perm?S.cp:S.cd)[`${sec.id}-${i}`]).length;
  const items=sec.items.map((item,i)=>{
    const key=`${sec.id}-${i}`,isChk=(sec.perm?S.cp:S.cd)[key],isExp=S.expCk[key];
    return`<div class="check-item" style="${isChk?`background:${sec.color}08;border-color:${sec.color}30`:""}"><div style="display:flex;gap:10px;align-items:flex-start;padding:11px 12px;cursor:pointer" onclick="toggleExpCk('${key}')"><div onclick="event.stopPropagation();toggleCk('${sec.id}','${key}',${sec.perm})" style="width:16px;height:16px;min-width:16px;border:1.5px solid ${isChk?sec.color:"#2d3748"};border-radius:3px;background:${isChk?sec.color:"transparent"};display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px">${isChk?`<span style="color:#070710;font-size:10px;font-weight:700">✓</span>`:""}</div><span style="flex:1;font-size:13px;line-height:1.5;color:${isChk?"#8892a4":"#c8d6e5"};text-decoration:${isChk?"line-through":"none"};text-decoration-color:#4a5568">${item.t}</span><span style="font-size:10px;color:#4a5568;margin-top:2px;display:inline-block;transform:${isExp?"rotate(180deg)":"rotate(0deg)"};transition:transform .15s">▾</span></div>${isExp?`<div style="padding:0 12px 10px 38px;font-size:12px;color:#8892a4;line-height:1.7;border-top:1px solid ${sec.color}20;padding-top:8px"><span style="color:${sec.color};margin-right:5px;font-size:9px;font-family:monospace">WHY:</span>${item.d}</div>`:""}</div>`;
  }).join("");
  return`<div class="row" style="margin-bottom:12px"><div><div style="font-size:9px;letter-spacing:3px;color:#4a5568;font-family:monospace">CHECKLISTS</div><div style="font-size:11px;color:#8892a4;margin-top:2px">Daily sections reset each morning · Go-Live is permanent</div></div><button class="btn-sm" onclick="resetDaily()" style="color:#f43f5e;border-color:#f43f5e30;background:#f43f5e12">RESET</button></div><div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px">${pills}</div><div class="row" style="margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #1a1a35"><div style="display:flex;gap:8px;align-items:center"><span style="font-size:20px;color:${sec.color}">${sec.icon}</span><div><div style="font-size:15px;color:#e8edf5">${sec.title}</div><div style="font-size:10px;color:#4a5568">${sec.perm?"Never resets":"Resets daily at midnight"}</div></div></div><div style="font-size:16px;color:${sec.color};font-family:monospace;font-weight:700">${done}/${sec.items.length}</div></div>${items}`;
}

// ── Main Render ────────────────────────────────────────────────────────────
function renderApp(){
  const days=S.mode==="paper"?S.paper:S.live;
  const st=calcSt(days);
  const acc=S.mode==="paper"?"#00ff9d":"#ffd700";
  const rem=Math.max(0,50-st.tc);
  const modeBtns=["paper","live"].map(m=>`<button onclick="setState({mode:'${m}',view:'dashboard'})" style="padding:5px 12px;font-size:10px;font-family:monospace;letter-spacing:1px;border-radius:6px;border:1px solid ${S.mode===m?(m==="paper"?"#00ff9d40":"#ffd70040"):"#1a1a35"};background:${S.mode===m?(m==="paper"?"#00ff9d18":"#ffd70018"):"transparent"};color:${S.mode===m?(m==="paper"?"#00ff9d":"#ffd700"):"#4a5568"};font-weight:${S.mode===m?700:400};cursor:pointer">${m==="paper"?"📄 PAPER":"💰 LIVE"}</button>`).join("");
  const progress=S.mode==="paper"?`<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:9px;color:#4a5568;font-family:monospace;letter-spacing:2px">TRADE PROGRESS</span><span style="font-size:9px;color:${rem===0?"#00ff9d":"#ffd700"};font-family:monospace">${st.tc}/50 · ${rem>0?rem+" to go":"✓ HIT"}</span></div><div class="progress-bar"><div style="height:100%;width:${Math.min(100,(st.tc/50)*100)}%;background:linear-gradient(90deg,${acc},#4ecdc4);border-radius:2px"></div></div></div>`:"";
  const navBtns=[["dashboard","Dashboard"],["journal","Journal"],["add","+ Add Day"],["checklist","Checklist"]].map(([v,l])=>`<button class="nav-btn${S.view===v?" on":""}" onclick="setState({view:'${v}'})" style="${S.view===v?`border-bottom-color:${acc}`:""};">${l.toUpperCase()}</button>`).join("");
  let content="";
  if(S.view==="dashboard")content=viewDashboard(days,st,acc);
  else if(S.view==="journal")content=viewJournal(days,st,acc);
  else if(S.view==="add")content=viewAdd(acc);
  else if(S.view==="checklist")content=viewChecklist();
  document.getElementById("app").innerHTML=`<div style="min-height:100vh;background:#070710;max-width:900px;margin:0 auto"><div class="hdr"><div class="row" style="margin-bottom:8px"><div><div style="font-size:9px;letter-spacing:3px;color:#4a5568;font-family:monospace">ORB5 · <span style="color:${acc}">${S.mode==="paper"?"PAPER TEST":"LIVE TRADING"}</span></div><div style="font-size:18px;color:#e8edf5;font-weight:400;margin-top:1px">Trading Journal</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:700;color:${st.net>=0?acc:"#f43f5e"};font-family:monospace">£${st.bal.toFixed(2)}</div><div style="font-size:10px;color:#4a5568;font-family:monospace">${fS(st.net)} (${st.ret.toFixed(1)}%)</div></div></div><div style="display:flex;gap:5px;margin-bottom:7px">${modeBtns}</div>${progress}<div style="display:flex;overflow-x:auto">${navBtns}</div></div><div class="view">${content}</div></div>`;
}


function render(){ if(isAuthed()) renderApp(); else showPasswordGate(); }

// ── Event Handlers ─────────────────────────────────────────────────────────
window.setState=function(u){Object.assign(S,u);if(isAuthed()) renderApp();};
window.setTf=function(u){Object.assign(S.tf,u);if(isAuthed()) renderApp();};
window.toggleDay=function(id){setState({expDay:S.expDay===id?null:id});};
window.toggleExpCk=function(key){S.expCk[key]=!S.expCk[key];if(isAuthed()) renderApp();};
window.toggleCk=function(id,key,perm){
  if(perm){S.cp[key]=!S.cp[key];lsS(KEYS.cp,S.cp);}
  else{S.cd[key]=!S.cd[key];saveCd();}
  if(isAuthed()) renderApp();
};
window.resetDaily=function(){S.cd={};saveCd();if(isAuthed()) renderApp();};
window.removePending=function(i){S.pending.splice(i,1);if(isAuthed()) renderApp();};
window.addTrade=function(){
  const amt=parseFloat(S.tf.amount);
  if(!S.tf.amount||isNaN(amt)||amt<=0){setState({err:"Enter a valid £ amount"});return;}
  S.pending.push({id:Date.now()+Math.random(),...S.tf,amount:parseFloat(amt.toFixed(2)),ticker:(S.tf.ticker||"").toUpperCase()});
  S.tf={...E0};S.err="";S.showTF=false;if(isAuthed()) renderApp();
};
window.saveDay=function(){
  if(!S.addDate){setState({err:"Date required"});return;}
  if(S.pending.length===0){setState({err:"Add at least one trade"});return;}
  const nd={id:Date.now(),date:S.addDate,imported:false,trades:[...S.pending],dayNotes:S.dayNotes};
  if(S.mode==="paper"){S.paper.push(nd);sortDays(S.paper);savePaper();}
  else{S.live.push(nd);sortDays(S.live);saveLive();}
  S.addDate="";S.pending=[];S.dayNotes="";S.err="";S.showTF=true;S.view="journal";if(isAuthed()) renderApp();
};
window.delDay=function(id){
  if(!confirm("Delete this day?"))return;
  if(S.mode==="paper"){S.paper=S.paper.filter(d=>d.id!==id);savePaper();}
  else{S.live=S.live.filter(d=>d.id!==id);saveLive();}
  S.expDay=null;if(isAuthed()) renderApp();
};

render();
</script>
